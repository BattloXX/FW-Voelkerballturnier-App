server {
    listen 80;
    server_name voelkerball.feuerwehr.wolfurt.at;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name voelkerball.feuerwehr.wolfurt.at;

    ssl_certificate     /etc/letsencrypt/live/voelkerball.feuerwehr.wolfurt.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voelkerball.feuerwehr.wolfurt.at/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    location /static/ {
        alias /var/www/voelkerball/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}
